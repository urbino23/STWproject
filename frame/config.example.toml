# AvianVisitors e-ink frame -- copy to config.toml and edit.
# config.toml is gitignored. Nothing secret lives here unless your WHOLE
# site is behind basic-auth (see the bottom).

# ---- the collage to mirror ----------------------------------------------
# Default LAN install:
base_url = "http://birdnet.local"
# ...or a forwarded public site:
# base_url = "https://bird.onethreenine.net"

hours = 24            # window shown on the frame: "heard in the last N hours"

# ---- titles (frame chrome -- the collage itself is the live site) --------
# Leave these out to keep the site's own titles. Set them for a frame-
# specific headline:
# shoot_title    = "onethreenine birds"   # small italic eyebrow
# shoot_subtitle = "heard today"          # large headline

# ---- where the screenshot comes from (pick exactly ONE) -----------------
# A) Capable frame Pi (Zero 2 W / Pi 3/4/5): take the screenshot on-device.
shoot = true
#
# B) Original Pi Zero W (can't run a browser): another host publishes the
#    screenshot; fetch it.
# image_url = "https://example.com/frame.png"
#
# C) A sibling process on this machine writes the PNG; read it.
# image = "~/.birdframe/shot.png"

# ---- panel --------------------------------------------------------------
rotate     = 90      # 90 or 270 -- flip if the frame hangs upside down
saturation = 0.6     # Inky colour saturation, 0-1

# ---- refresh cadence ----------------------------------------------------
# E-ink refreshes are slow (~30s) and flash, so the frame only refreshes
# when the species set / call-count brackets change -- plus a daily heal.
quiet_start = 22     # no refresh during [22:00, 06:00) local time
quiet_end   = 6
heal_hours  = 24     # force a refresh at least this often (panel health)

# ---- paths --------------------------------------------------------------
state = "~/.birdframe/state.json"
cache = "~/.birdframe"
timeout = 45

# ---- only if your WHOLE site is password-gated --------------------------
# (the AvianVisitors default leaves the collage + detection API public, so
# you normally do NOT need these)
# basic_user = "monalisa"
# basic_pass = "..."
